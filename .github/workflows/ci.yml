name: CI

on:
  push:
    branches: [main]
  pull_request:

# 최소 권한 — 토큰은 읽기만.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 지원 범위 확인: 3.9(최소) ~ 최신
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify offline (no network-capable imports)
        run: bash verify.sh
      - name: Run tests (stdlib unittest — zero deps)
        run: python -m unittest discover -s tests -t .
